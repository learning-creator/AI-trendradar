name: Trend Summary

on:
  schedule:
    # Beijing Monday 09:20, summarize the previous complete week.
    - cron: "20 1 * * 1"
    # Beijing first day 09:35, summarize the previous complete month.
    - cron: "35 1 1 * *"
    # Beijing Jan/Apr/Jul/Oct 09:50, summarize the previous complete quarter.
    - cron: "50 1 1 1,4,7,10 *"
    # Beijing Jan/Jul 10:05, summarize the previous complete half-year.
    - cron: "5 2 1 1,7 *"
    # Beijing Jan 1 10:20, summarize the previous complete year.
    - cron: "20 2 1 1 *"
  workflow_dispatch:
    inputs:
      period:
        description: "Trend summary period"
        required: true
        default: "weekly"
        type: choice
        options:
          - weekly
          - monthly
          - quarterly
          - semiannual
          - yearly

concurrency:
  group: trend-summary-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve period
        id: period
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "period=${{ inputs.period }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "${{ github.event.schedule }}" in
            "20 1 * * 1") echo "period=weekly" >> "$GITHUB_OUTPUT" ;;
            "35 1 1 * *") echo "period=monthly" >> "$GITHUB_OUTPUT" ;;
            "50 1 1 1,4,7,10 *") echo "period=quarterly" >> "$GITHUB_OUTPUT" ;;
            "5 2 1 1,7 *") echo "period=semiannual" >> "$GITHUB_OUTPUT" ;;
            "20 2 1 1 *") echo "period=yearly" >> "$GITHUB_OUTPUT" ;;
            *) echo "period=weekly" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Generate trend summary
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          BARK_URL: ${{ secrets.BARK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
          GENERIC_WEBHOOK_TEMPLATE: ${{ secrets.GENERIC_WEBHOOK_TEMPLATE }}
          AI_ANALYSIS_ENABLED: ${{ secrets.AI_ANALYSIS_ENABLED }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
          GITHUB_ACTIONS: true
        run: uv run python -m trendradar --trend-summary "${{ steps.period.outputs.period }}"

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trend-summary-${{ steps.period.outputs.period }}
          path: output/summaries/**
          if-no-files-found: ignore
